services:
  - type: web
    name: fedex-shipping-api
    runtime: node
    plan: starter
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: NODE_VERSION
        value: 20
      - key: DRAFTS_DIR
        value: /var/data/drafts
      - key: PREFERENCES_DIR
        value: /var/data/preferences
      - key: PREFERENCES_ENCRYPTION_KEY
        sync: false
      - key: PORT
        sync: false
      - key: ALLOWED_ORIGIN
        sync: false
      - key: FEDEX_API_KEY
        sync: false
      - key: FEDEX_SECRET_KEY
        sync: false
      - key: FEDEX_ACCOUNT_NUMBER
        sync: false
      - key: FEDEX_BASE_URL
        sync: false
      - key: FEDEX_SHIPPER_CONTACT_NAME
        sync: false
      - key: FEDEX_SHIPPER_COMPANY_NAME
        sync: false
      - key: FEDEX_SHIPPER_PHONE
        sync: false
      - key: FEDEX_SHIPPER_EMAIL
        sync: false
      - key: FEDEX_SHIPPER_ADDRESS_LINE1
        sync: false
      - key: FEDEX_SHIPPER_ADDRESS_LINE2
        sync: false
      - key: FEDEX_SHIPPER_CITY
        sync: false
      - key: FEDEX_SHIPPER_STATE
        sync: false
      - key: FEDEX_SHIPPER_POSTAL_CODE
        sync: false
      - key: FEDEX_SHIPPER_COUNTRY_CODE
        sync: false
      - key: SHOPIFY_API_KEY
        sync: false
      - key: SHOPIFY_API_PASSWORD
        sync: false
      - key: SHOPIFY_SHOP_NAME
        sync: false
    disk:
      name: fedex-shipping-api-data
      mountPath: /var/data
      sizeGB: 1
